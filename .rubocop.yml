AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false

require:
  - rubocop-performance
  - rubocop-rspec
  - rubocop-thread_safety
  - rubocop-sorbet

inherit_gem:
  standard-sorbet: config/base.yml

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always


Naming/FileName:
  Exclude:
    - 'lib/simplecov-ai.rb'

Metrics/BlockLength:
  Enabled: false
Metrics/ModuleLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
RSpec/ExampleLength:
  Enabled: false
RSpec/MultipleExpectations:
  Enabled: false
RSpec/MultipleMemoizedHelpers:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Gemspec/DevelopmentDependencies:
  Enabled: false
Gemspec/RequiredRubyVersion:
  Enabled: false
Style/Documentation:
  Enabled: false
Lint/MissingCopEnableDirective:
  Enabled: false
Style/ClassVars:
  Enabled: false
Style/ClassMethods:
  Enabled: false
RSpec/FilePath:
  Enabled: false
ThreadSafety/InstanceVariableInClassMethod:
  Enabled: false
Style/MultilineBlockChain:
  Enabled: false
Layout/LineLength:
  Enabled: false
RSpec/DescribedClass:
  Enabled: false

Sorbet/ForbidTUntyped:
  Enabled: true

Sorbet/ForbidTUnsafe:
  Enabled: true

Sorbet/EnforceSignatures:
  Enabled: true

Sorbet/SignatureBuildOrder:
  Enabled: false

Sorbet/KeywordArgumentOrdering:
  Enabled: false

Sorbet/ForbidRBIOutsideOfAllowedPaths:
  Enabled: false

Sorbet/ForbidExtendTSigHelpersInShims:
  Enabled: false

Sorbet/StrictSigil:
  Enabled: true
  Exclude:
    - 'bin/tapioca'
    - 'sorbet/tapioca/require.rb'
    - 'spec/**/*'

Sorbet/HasSigil:
  Enabled: true
  Exclude:
    - 'bin/tapioca'

Sorbet/FalseSigil:
  Enabled: true
  Exclude:
    - 'bin/tapioca'
